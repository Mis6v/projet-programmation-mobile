name: transport_app
description: Application mobile simple pour la réservation de trajets de transport.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.14.1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/bus.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/bus.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/bus.png

